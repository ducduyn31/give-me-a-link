name: Dependabot Changeset

# Auto-adds a patch changeset to Dependabot PRs that bump *production*
# dependencies, so they flow through the changesets release pipeline.
# Dev-dependency and github-actions PRs are skipped — they don't affect
# shipped extension behaviour, so they merge without triggering a release.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - package.json
      - bun.lock

permissions:
  contents: write
  pull-requests: read

jobs:
  changeset:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2

      - name: Checkout PR branch
        if: steps.meta.outputs.dependency-type == 'direct:production'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        if: steps.meta.outputs.dependency-type == 'direct:production'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Generate changeset
        if: steps.meta.outputs.dependency-type == 'direct:production'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          SLUG=$(printf '%s' "$PR_BRANCH" | tr '/' '-' | tr -cd 'a-zA-Z0-9-' | cut -c1-50)
          FILE=".changeset/dependabot-${SLUG}.md"

          if [ -f "$FILE" ]; then
            echo "Changeset already exists at $FILE — skipping."
            exit 0
          fi

          mkdir -p .changeset
          {
            echo "---"
            echo "'url-md-link': patch"
            echo "---"
            echo ""
            echo "$PR_TITLE"
          } > "$FILE"

          echo "Wrote $FILE"

      - name: Format changeset
        if: steps.meta.outputs.dependency-type == 'direct:production'
        run: |
          set -euo pipefail
          bun install --frozen-lockfile
          bun run format

      - name: Commit changeset
        if: steps.meta.outputs.dependency-type == 'direct:production'
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .changeset
          git commit -m "chore: add changeset for dependabot update"
          git push
