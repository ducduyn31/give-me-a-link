name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run verify

      # Pre-compute the next version so the release PR title/commit can
      # include it. On the publish run there are no pending changesets,
      # so `newVersion` is null and we fall back to a placeholder that's
      # never actually used (no PR is created in that case).
      - name: Resolve next version
        id: next-version
        run: |
          bun changeset status --output=release-status.json
          NEXT_VERSION=$(jq -r '.releases[0].newVersion // "next"' release-status.json)
          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          rm release-status.json

      # changesets/action expects a `version` script and a `publish` script.
      # `version` runs `changeset version` + syncs manifest.json.
      # `publish` runs our marketplace release script.
      #
      # On a push to main:
      # - If there are pending changesets, the action opens/updates a
      #   "Version Packages" PR.
      # - If the previous push was that PR being merged (no pending
      #   changesets, version already bumped), the action runs `publish`.
      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run release
          commit: 'chore: release v${{ steps.next-version.outputs.version }}'
          title: 'chore: release v${{ steps.next-version.outputs.version }}'
          createGithubReleases: false
        env:
          # Must NOT be the default GITHUB_TOKEN — PRs and commits authored
          # by GITHUB_TOKEN do not trigger other workflows (e.g. CI), which
          # would leave the release PR without status checks. Use a PAT
          # (or GitHub App token) with `contents: write` + `pull-requests: write`.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
